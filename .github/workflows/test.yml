name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: read
  pull-requests: write
  id-token: write       # frontend-ci 内蔵 secret-verify が要求 (ci-workflows#38)

jobs:
  ci:
    uses: ippoan/ci-workflows/.github/workflows/frontend-ci.yml@main
    with:
      has_integration: true
      # lockfile が ^0.2.55 未満を pin していても manifest に追従して解決する
      # (org caller template 標準。CCoW からは lockfile を再生成できないため)
      install_command: 'npm install'
      # rust-alc-api backend に対する live integration test を Release Wave の
      # compatibility matrix に記録する (= Compatibility (all consumers) /
      # Repo リリース状況 に consumer として出す)。docker-compose.test.yml が
      # $API_IMAGE で backend image を起動し、vitest を live モード
      # (API_BASE_URL=http://localhost:18080) で実 API に向ける。記録する image は
      # production の API base (monolith `rust-alc-api`、wrangler の
      # NUXT_PUBLIC_API_BASE) と同一なので truthful な突合になる。
      compat_backend_repo: 'ippoan/rust-alc-api'
      compat_backend_image_env: 'API_IMAGE'
      integration_env: 'API_BASE_URL=http://localhost:18080'
      post_install_script: 'npx nuxt prepare'
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # cross-org (ohishi-exp → ippoan/ci-workflows) は secrets: inherit が
      # 効かないため明示渡し (Refs ippoan/ci-workflows#125)
      CI_APP_ID: ${{ secrets.CI_APP_ID }}
      CI_APP_PRIVATE_KEY: ${{ secrets.CI_APP_PRIVATE_KEY }}
      # deploy-release の traffic-report (v* tag push) が要求。同じ cross-org
      # 理由で明示渡し (release-wave.yml / ci-shape-report.yml と同 pattern)
      RELEASE_WAVE_WEBHOOK_SECRET: ${{ secrets.RELEASE_WAVE_WEBHOOK_SECRET }}
