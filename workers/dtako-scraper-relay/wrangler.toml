name = "nuxt-dtako-admin-scraper-relay"
account_id = "24b45709d060d957340180e995f0d373"
compatibility_date = "2024-09-19"
compatibility_flags = ["nodejs_compat"]
main = "src/index.ts"
# DTAKO_ACCOUNTS (dashboard の plain Environment Variable、Refs #83) は
# wrangler.toml に無いため、これが無いと `wrangler deploy` (この worker は DO
# migration があり versions upload できないため classic deploy 必須) のたびに
# 消える (Wrangler の既定挙動: config に無い binding は deploy 時に削除される)。
# `keep_vars` は top-level only (named environment 配下には書けない)。
keep_vars = true

# この worker は app 本体 (nuxt-dtako-admin) からの service binding (SCRAPER_RELAY)
# 経由でのみアクセスさせる。`workers_dev = false` で `*.workers.dev` の公開ルートを
# 無効化し、外部から /dvr-api/* 等を直接叩けないようにする (service binding は worker
# 名で解決するため公開ルート無しでも app 経由アクセスは無傷)。
workers_dev = false

[[durable_objects.bindings]]
name = "RELAY"
class_name = "DtakoScraperRelayDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DtakoScraperRelayDO"]

[[secrets_store_secrets]]
binding = "INTERNAL_SHARED_SECRET"
store_id = "bd7bc91a3e5f4111add4acf6cb4b8733"
secret_name = "INTERNAL_SHARED_SECRET"

# auth-worker への service binding。/auth/introspect と
# /alc-internal-proxy/api/upload (ohishi-exp/dtako-scraper#22 の自動アップロード)
# の両方をこれ経由で叩く (Worker→Worker in-process fetch、公開 fetch より低遅延)。
[[services]]
binding = "AUTH_WORKER"
service = "auth-worker"

# Workers VPC binding (beta) — kagoya_tunnel (Tunnel ID
# e690242e-06cb-43a6-b2f5-67dfec95ca46) 経由で dtako-scraper (VPS
# 127.0.0.1:8081) に到達する VPC Service `dtako-scraper-relay`。
[[vpc_services]]
binding = "DTAKO_SCRAPER_VPC"
service_id = "019f20af-c6ac-7dd0-8381-ea22add4bd40"

[observability]
enabled = true

# Tail Worker (Refs #134 後続報告)。DtakoScraperRelayDO の ETC 診断ログは
# ctx.waitUntil() で継続するバックグラウンド処理内で出るため、通常の
# Workers Logs には反映されない (Cloudflare 公式ドキュメントも waitUntil() での
# ログ出力には Tail Worker を推奨、実機で未反映を確認済み 2026-07-04)。
[[tail_consumers]]
service = "nuxt-dtako-admin-scraper-relay-tail"

# VPS / GCE cron の Worker 移行 (Refs ohishi-exp/dtako-scraper#22 /
# ohishi-exp/browser-render-rust#14)。cron 式は src/cron.ts の
# DTAKO_CRON / ETC_CRON 定数と一致させること (ズレると scheduled handler が
# 「未知の cron 式」を log して何もしない)。
# - "0 16 * * *"        = 01:00 JST。dtako 日次 (VPS cron dtako-scraper-daily と同時刻)。
#                          SCRAPER_MODE=http + DTAKO_ACCOUNTS 設定時のみ実走。
# - "0 21,22,23,0 * * *" = JST 6,7,8,9 時。ETC 明細 (GCE cron etc-scrape-batch-env と
#                          同時刻)。ETC_ACCOUNTS (dashboard plain var) 設定時のみ実走。
[triggers]
crons = [
  "0 16 * * *",
  "0 21,22,23,0 * * *",
]

# ETC 明細 CSV の保存先 (app 本体の DTAKO_R2 と同じ dtako-uploads bucket)。
# key は `{ETC_R2_PREFIX}/{user_id}/{YYYY-MM-DD}/{HHMMSS}.csv` (JST)。
[[r2_buckets]]
binding = "DTAKO_R2"
bucket_name = "dtako-uploads"

# NET780 アップロードデータの検索カタログ (app 本体 wrangler.toml と同じ D1、Refs #299)。
# R2 が正、D1 は車番/乗務員CD/運行No 検索用の再構築可能インデックス。
[[d1_databases]]
binding = "DTAKO_DB"
database_name = "dtako-admin-uploads-catalog"
database_id = "81dd4136-b5c8-4c1b-93c8-28fdafbe1a8d"
migrations_dir = "../../migrations"

[vars]
NUXT_PUBLIC_AUTH_WORKER_URL = "https://auth.ippoan.org"
ETC_R2_PREFIX = "etc"
# 拘束時間管理表 CSV / サマリ JSON のアーカイブ prefix (Refs #241)。key 設計と
# バージョン管理 (latest + v-{ts}、7日 retention) は theearth-restraint-client.ts 参照。
RESTRAINT_R2_PREFIX = "restraint"
# NET780 生データ一括ダウンロード ZIP のアーカイブ prefix (Refs #302 続き)。
# key 設計 (内容ハッシュ dedup + operationNo ポインタ index) は
# theearth-net780-client.ts の net780R2Paths 参照。
NET780_R2_PREFIX = "net780"

[env.staging]
name = "nuxt-dtako-admin-scraper-relay-staging"
# staging も同様に公開ルートを閉じ、app (service binding) 経由のみにする。
workers_dev = false

[[env.staging.durable_objects.bindings]]
name = "RELAY"
class_name = "DtakoScraperRelayDO"

[[env.staging.migrations]]
tag = "v1"
new_sqlite_classes = ["DtakoScraperRelayDO"]

[[env.staging.secrets_store_secrets]]
binding = "INTERNAL_SHARED_SECRET"
store_id = "bd7bc91a3e5f4111add4acf6cb4b8733"
secret_name = "INTERNAL_SHARED_SECRET"

[[env.staging.services]]
binding = "AUTH_WORKER"
service = "auth-worker-staging"

[[env.staging.vpc_services]]
binding = "DTAKO_SCRAPER_VPC"
service_id = "019f20af-c6ac-7dd0-8381-ea22add4bd40"

# named environment は top-level [observability] を継承しない (wrangler の既定挙動、
# keep_vars と同種の罠)。これが無いと staging では console.log (Workers Logs) が
# 一切キャプチャされず、request/websocket のライフサイクルイベントだけが見える状態
# になる (実害確認: ETC の riyouMonth 診断ログが staging で全く出なかった、2026-07-04)。
[env.staging.observability]
enabled = true

# top-level [[tail_consumers]] も named environment には継承されないので個別宣言。
[[env.staging.tail_consumers]]
service = "nuxt-dtako-admin-scraper-relay-tail-staging"

[env.staging.triggers]
crons = [
  "0 16 * * *",
  "0 21,22,23,0 * * *",
]

# staging も同じ dtako-uploads bucket を使うが、key prefix (`etc-staging/`) で
# 本番の `etc/` と分離する (ETC_R2_PREFIX 参照)。
[[env.staging.r2_buckets]]
binding = "DTAKO_R2"
bucket_name = "dtako-uploads"

# named env は top-level binding を継承しないので再宣言する。R2 と同じく本番と共用
# (r2_key に env 別 prefix (net780-staging/ 等) が含まれるので同一テーブルでも
# 見分けはつく)。
[[env.staging.d1_databases]]
binding = "DTAKO_DB"
database_name = "dtako-admin-uploads-catalog"
database_id = "81dd4136-b5c8-4c1b-93c8-28fdafbe1a8d"
migrations_dir = "../../migrations"

[env.staging.vars]
NUXT_PUBLIC_AUTH_WORKER_URL = "https://auth-staging.ippoan.org"
# ohishi-exp/dtako-scraper#22 のブラウザレス化を staging で試験する (DTAKO_ACCOUNTS は
# 値に秘密を含むため wrangler.toml には置かず、dashboard の plain var で別途投入する)。
SCRAPER_MODE = "http"
ETC_R2_PREFIX = "etc-staging"
RESTRAINT_R2_PREFIX = "restraint-staging"
NET780_R2_PREFIX = "net780-staging"

# 軽量プレビュー環境 (create-preview skill、main 以外の branch への push ごとに
# test/typecheck 無しで deploy)。ETC riyouMonth 診断イテレーションを staging を
# 汚さず高速に回すために追加 (Refs #134)。この worker は service binding 経由
# でのみ叩かれ custom domain route を持たないため、staging と同じく
# workers_dev=false だけで公開ルートは追加しない。
[env.preview]
name = "nuxt-dtako-admin-scraper-relay-preview"
workers_dev = false

[[env.preview.durable_objects.bindings]]
name = "RELAY"
class_name = "DtakoScraperRelayDO"

[[env.preview.migrations]]
tag = "v1"
new_sqlite_classes = ["DtakoScraperRelayDO"]

[[env.preview.secrets_store_secrets]]
binding = "INTERNAL_SHARED_SECRET"
store_id = "bd7bc91a3e5f4111add4acf6cb4b8733"
secret_name = "INTERNAL_SHARED_SECRET"

[[env.preview.services]]
binding = "AUTH_WORKER"
service = "auth-worker-staging"

[[env.preview.vpc_services]]
binding = "DTAKO_SCRAPER_VPC"
service_id = "019f20af-c6ac-7dd0-8381-ea22add4bd40"

[env.preview.observability]
enabled = true

[[env.preview.tail_consumers]]
service = "nuxt-dtako-admin-scraper-relay-tail-staging"

[env.preview.triggers]
crons = []

# preview は staging と同じ dtako-uploads bucket を使うが、key prefix を分離する。
[[env.preview.r2_buckets]]
binding = "DTAKO_R2"
bucket_name = "dtako-uploads"

# named env は top-level binding を継承しないので再宣言する。staging と同じ D1。
[[env.preview.d1_databases]]
binding = "DTAKO_DB"
database_name = "dtako-admin-uploads-catalog"
database_id = "81dd4136-b5c8-4c1b-93c8-28fdafbe1a8d"
migrations_dir = "../../migrations"

[env.preview.vars]
NUXT_PUBLIC_AUTH_WORKER_URL = "https://auth-staging.ippoan.org"
SCRAPER_MODE = "http"
ETC_R2_PREFIX = "etc-preview"
RESTRAINT_R2_PREFIX = "restraint-preview"
NET780_R2_PREFIX = "net780-preview"
