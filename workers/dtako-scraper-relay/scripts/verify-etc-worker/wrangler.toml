# wrangler deploy --temporary 専用の使い捨て config (cookie 委譲版)。
#
# 本番 dtako-scraper-relay worker (../../wrangler.toml、DO migration あり) とは
# 完全に独立。`name` を指定しないと --temporary が一時アカウント側で採番する。
#
# credential (ETC_USER/ETC_PASS) は不要 — この worker は cookie を POST /verify の
# body で受け取り scrapeEtcFromCookies を実行する (login は手元ブラウザで済ませる)。
# --var は使わない。
#
# 使い方 (workers/dtako-scraper-relay ディレクトリから):
#   npx wrangler deploy --temporary --config scripts/verify-etc-worker/wrangler.toml \
#     --name verify-etc-<好きな名前>
main = "index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]
