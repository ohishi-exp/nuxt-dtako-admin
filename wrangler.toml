name = "dtako-admin"
account_id = "24b45709d060d957340180e995f0d373"
compatibility_date = "2025-03-10"
# nodejs_compat は ExcelJS が必要とする node:stream / node:buffer 互換のため
compatibility_flags = ["nodejs_compat"]
# Nitro 出力を包む custom worker entry。/ws/scraper を dtako-scraper-relay worker に
# service binding 経由で転送し、それ以外を Nitro に委譲する (worker/index.ts)。
# DO 本体は別 worker nuxt-dtako-admin-scraper-relay に分離済み (この worker は DO
# binding / migration を持たないので `wrangler versions upload` (no-traffic)
# release が CF error 10211/10061 を踏まない、nuxt-items/items-sync と同型)。
main = "./worker/index.ts"
assets = { directory = ".output/public/", binding = "ASSETS" }
# release tag の `wrangler versions upload` (no-traffic) が version ごとの
# preview URL (`<hash>-dtako-admin.<subdomain>.workers.dev`) を出力するよう
# opt-in する (auth-worker と同型)。frontend-ci がこの URL を pending-release
# webhook で ci-dashboard に報告し、/release-wave の Pending releases と
# preview-dtako.ippoan.org router (flip 前 E2E) が使う。production traffic
# は下の custom domain route のままで独立 (Refs ippoan/ci-dashboard#472)。
preview_urls = true

[build]
command = "npm run build"

[[routes]]
pattern = "dtako.ippoan.org"
custom_domain = true

# Y時間 エクスポート用テンプレ xlsx を `templates/kyoto-soft/base.xlsx` 等の key で配置
[[r2_buckets]]
binding = "DTAKO_R2"
bucket_name = "dtako-uploads"

# auth-worker POST /auth/introspect (#434 step 2) を叩くための共有 secret。
# /api/proxy/* の forward 前段で browser JWT を introspect 検証 + identity 注入
# (X-Tenant-ID + X-User-ID/Email/Role) に使う。auth-worker / cc-relay / ref-files /
# carins / dtako-logs と同じ CF Secrets Store entry を物理共有。GCP cloudsql-sv に
# 同名 secret が SoT として存在し、frontend-ci の secret-verify が検証する。
[[secrets_store_secrets]]
binding = "INTERNAL_SHARED_SECRET"
store_id = "bd7bc91a3e5f4111add4acf6cb4b8733"
secret_name = "INTERNAL_SHARED_SECRET"

# /vid-check の GPS 軌跡表示 (VidMap.vue) 用 Google Maps JS API key。
# nuxt_dtako_logs とは別に発行した専用キー (HTTP リファラー制限:
# dtako.ippoan.org / dtako-staging.ippoan.org)。GCP Secret Manager
# (projects/747065218280/secrets/NUXT_PUBLIC_GOOGLEMAP_KEY) が SoT。
# client bundle に最終的に載る前提の public 値なので機密性は低いが、値の
# 投入自体は secrets-inventory 経由に揃えて Secrets Store binding にしている。
# **binding 名を NUXT_PUBLIC_* にしない**こと — Nuxt/Nitro の public
# runtimeConfig 自動 env 上書きが Secrets Store binding オブジェクト
# (文字列ではなく `.get()` を持つオブジェクト) をそのまま runtimeConfig に
# 突っ込み、起動時の deepFreeze が `Uncaught TypeError: Cannot freeze`
# (code 10021) で fail する (2026-07-03 実害、wrangler deploy 自体が落ちた)。
# `server/api/vid-check/map-key.get.ts` が `.get()` して plain string を
# 返す小さな endpoint 経由で client に渡す。
[[secrets_store_secrets]]
binding = "GOOGLEMAP_KEY_SECRET"
store_id = "bd7bc91a3e5f4111add4acf6cb4b8733"
secret_name = "NUXT_PUBLIC_GOOGLEMAP_KEY"

# introspect を公開 HTTP ではなく CF service binding (worker-to-worker, 内部) で叩く。
[[services]]
binding = "AUTH_WORKER"
service = "auth-worker"

# dtako-scraper-relay (DtakoScraperRelayDO) worker への service binding。
# DO 本体 + DO binding + migration は別 worker nuxt-dtako-admin-scraper-relay 側が
# 内包し、app は worker→worker fetch で /ws/scraper を転送するだけ。
[[services]]
binding = "SCRAPER_RELAY"
service = "nuxt-dtako-admin-scraper-relay"

[vars]
NUXT_PUBLIC_API_BASE = "https://rust-alc-api-566bls5vfq-an.a.run.app"
NUXT_PUBLIC_AUTH_WORKER_URL = "https://auth.ippoan.org"
# /api/proxy が introspect 後に転送する backend (runtimeConfig.alcApiUrl)。
NUXT_ALC_API_URL = "https://rust-alc-api-566bls5vfq-an.a.run.app"
# 自オリジン (dtako.ippoan.org) の DO relay に WS 接続する
# (front Worker から直接 Cloudflare Tunnel/Workers VPC 経由で dtako-scraper に
# 到達する構成。rust-alc-api の SCRAPER_URL 経由の旧経路は廃止、Refs #XXX)。
NUXT_PUBLIC_SCRAPER_RELAY_URL = "wss://dtako.ippoan.org"

# secret-verify (frontend-ci) 用の明示宣言。**必ず空 `[]` にする**。
# `secrets.required` は CI secret-verify の監査対象であると同時に **wrangler が
# 「解決必須の worker secret binding」とみなす**フィールドでもある。ここに
# INTERNAL_SHARED_SECRET を書くと wrangler deploy が "Secrets Store Secret と
# Secret bindings に同名 assign / unique 名にせよ" (= secrets_store_secrets と衝突)
# で fail する。INTERNAL_SHARED_SECRET は上記 secrets_store_secrets (Secrets Store
# binding) で解決するので required には載せない (nuxt-items / alc-app と同じ)。
[secrets]
required = []

[env.staging]
name = "dtako-admin-staging"

[[env.staging.routes]]
pattern = "dtako-staging.ippoan.org"
custom_domain = true
[[env.staging.r2_buckets]]
binding = "DTAKO_R2"
# staging も同じ本番 R2 bucket を read-only で参照 (テンプレは配信のみ)。
# 専用 staging bucket が必要になったら `dtako-uploads-staging` 等を作って差し替える。
bucket_name = "dtako-uploads"

# named env は top-level binding を継承しないので再宣言する。
# staging/prod 統合 entry なので同じ secret_name (auth-worker #189)。
[[env.staging.secrets_store_secrets]]
binding = "INTERNAL_SHARED_SECRET"
store_id = "bd7bc91a3e5f4111add4acf6cb4b8733"
secret_name = "INTERNAL_SHARED_SECRET"

[[env.staging.secrets_store_secrets]]
binding = "GOOGLEMAP_KEY_SECRET"
store_id = "bd7bc91a3e5f4111add4acf6cb4b8733"
secret_name = "NUXT_PUBLIC_GOOGLEMAP_KEY"

[[env.staging.services]]
binding = "AUTH_WORKER"
service = "auth-worker-staging"

[[env.staging.services]]
binding = "SCRAPER_RELAY"
service = "nuxt-dtako-admin-scraper-relay-staging"

[env.staging.vars]
NUXT_PUBLIC_API_BASE = "https://rust-alc-api-staging-566bls5vfq-an.a.run.app"
NUXT_PUBLIC_AUTH_WORKER_URL = "https://auth-staging.ippoan.org"
NUXT_ALC_API_URL = "https://rust-alc-api-staging-566bls5vfq-an.a.run.app"
NUXT_PUBLIC_SCRAPER_RELAY_URL = "wss://dtako-staging.ippoan.org"

# 軽量プレビュー環境 (create-preview skill、main 以外の branch への push ごとに
# test/typecheck 無しで deploy)。backend は staging をそのまま再利用する
# (専用 DB / 専用 backend は持たない)。custom_domain route を使うため
# workers_dev は明示的に無効化する。
[env.preview]
name = "dtako-admin-preview"
workers_dev = false

[[env.preview.routes]]
pattern = "dtako-preview.ippoan.org"
custom_domain = true

[[env.preview.r2_buckets]]
binding = "DTAKO_R2"
bucket_name = "dtako-uploads"

# named env は top-level binding を継承しないので再宣言する。staging と同じ
# secret_name (auth-worker #189)。
[[env.preview.secrets_store_secrets]]
binding = "INTERNAL_SHARED_SECRET"
store_id = "bd7bc91a3e5f4111add4acf6cb4b8733"
secret_name = "INTERNAL_SHARED_SECRET"

[[env.preview.secrets_store_secrets]]
binding = "GOOGLEMAP_KEY_SECRET"
store_id = "bd7bc91a3e5f4111add4acf6cb4b8733"
secret_name = "NUXT_PUBLIC_GOOGLEMAP_KEY"

[[env.preview.services]]
binding = "AUTH_WORKER"
service = "auth-worker-staging"

# scraper-relay は専用の preview worker (nuxt-dtako-admin-scraper-relay-preview、
# workers/dtako-scraper-relay/wrangler.toml の [env.preview]) を使う。ETC の
# 実機診断イテレーションを共有 staging を汚さずに回すため (Refs #134)。
[[env.preview.services]]
binding = "SCRAPER_RELAY"
service = "nuxt-dtako-admin-scraper-relay-preview"

[env.preview.vars]
NUXT_PUBLIC_API_BASE = "https://rust-alc-api-staging-566bls5vfq-an.a.run.app"
NUXT_PUBLIC_AUTH_WORKER_URL = "https://auth-staging.ippoan.org"
NUXT_ALC_API_URL = "https://rust-alc-api-staging-566bls5vfq-an.a.run.app"
NUXT_PUBLIC_SCRAPER_RELAY_URL = "wss://dtako-preview.ippoan.org"

# top-level [secrets] も named environment には継承されない (wrangler が deploy
# 時に warning を出す、この repo で既出の keep_vars/observability 系と同型の罠)。
[env.preview.secrets]
required = []
